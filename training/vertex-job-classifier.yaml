workerPoolSpecs:
  - machineSpec:
      machineType: a2-highgpu-1g
      acceleratorType: NVIDIA_TESLA_A100
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: YOUR_DOCKER_REGISTRY/trainer:latest
      command: ["python", "training/train_classifier.py"]
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 100
