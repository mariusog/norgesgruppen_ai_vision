workerPoolSpecs:
  - machineSpec:
      machineType: a2-highgpu-1g
      acceleratorType: NVIDIA_TESLA_A100
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: YOUR_DOCKER_REGISTRY/trainer:latest
      command:
        - "python"
        - "training/train.py"
      args:
        - "--data"
        - "training/data.yaml"
        - "--model"
        - "yolov8l.pt"
        - "--imgsz"
        - "1280"
        - "--batch"
        - "4"
        - "--epochs"
        - "150"
        - "--run-id"
        - "yolov8l-1280_augmented"
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 100
